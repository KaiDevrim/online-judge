[supervisord]
nodaemon=true

[program:uwsgi]
directory=/usr/local/app/site
command=/usr/local/app/site/venv/bin/uwsgi --ini uwsgi.ini
autostart=true
autorestart=true
stderr_logfile=/var/log/uwsgi.err.log
stdout_logfile=/var/log/uwsgi.out.log

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx.err.log
stdout_logfile=/var/log/nginx.out.log
